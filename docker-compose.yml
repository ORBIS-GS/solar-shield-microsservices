version: '3.9'

services:

  # ─── Infraestrutura ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: solar-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: solar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Microsserviço 1: Ingest Service ─────────────────────────────────────────

  ingest-service:
    build:
      context: ./ingest-service
      dockerfile: Dockerfile
    container_name: solar-ingest
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ─── Microsserviço 2: Alert Service ──────────────────────────────────────────

  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    container_name: solar-alert
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  # ─── API Gateway: Nginx ───────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: solar-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ingest-service
      - alert-service
    restart: on-failure
