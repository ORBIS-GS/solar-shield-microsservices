events {
    worker_connections 1024;
}

http {

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Zona "api": 10 MB, limite de 10 req/s por IP (GET /api/alerts)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Zona "ingest": mais restrita — 3 req/s para POST /api/ingest/gst
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=3r/s;

    # HTTP 429 quando rate limit é atingido
    limit_req_status 429;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream ingest_service {
        server ingest-service:8081;
    }

    upstream alert_service {
        server alert-service:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # ── POST /api/ingest/gst → ingest-service:8081/ingest/gst ────────────
        # A reescrita remove o prefixo /api, mantendo /ingest/gst intacto.
        location /api/ingest/ {
            limit_req zone=ingest burst=5 nodelay;

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://ingest_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── GET /api/alerts → alert-service:8082/alerts ──────────────────────
        location /api/alerts {
            limit_req zone=api burst=20 nodelay;

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://alert_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }

        # ── Health check do gateway ───────────────────────────────────────────
        location /health {
            return 200 '{"status":"UP","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Erros personalizados ──────────────────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Try again later."}';
        }

        error_page 502 503 @upstream_error;
        location @upstream_error {
            default_type application/json;
            return 503 '{"error":"Service Unavailable","message":"Upstream service is not responding."}';
        }
    }
}
